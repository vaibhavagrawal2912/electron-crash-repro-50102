<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        /* -webkit-app-region:drag makes the entire window draggable (no system frame) */
        -webkit-app-region: drag;
        user-select: none;
        overflow: hidden;
      }
      .icon { font-size: 48px; margin-bottom: 16px; }
      h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
      p  { font-size: 13px; opacity: 0.8; text-align: center; max-width: 320px; line-height: 1.5; }
      .tag {
        margin-top: 20px;
        background: rgba(255,255,255,0.2);
        border-radius: 20px;
        padding: 4px 16px;
        font-size: 11px;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div class="icon">⚡</div>
    <h2>Frameless Window</h2>
    <p>Keep your mouse cursor here while this window cycles open &amp; close to trigger the crash.</p>
    <div class="tag">frame: false &nbsp;|&nbsp; alwaysOnTop: true</div>
  </body>
</html>
